<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Social links profile</title>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <style>
      .attribution {
        font-size: 0.6875rem;
        text-align: center;
      }
      .attribution a {
        color: hsl(228, 45%, 44%);
      }
    </style>

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Jessica Randall London, United Kingdom "Front-end developer and avid
    reader." GitHub Frontend Mentor LinkedIn Twitter Instagram -->

    <section>
      <div class="profile_section">
        <!-- Upper content -->
        <div class="upper">
          <img class="image" src="assets/images/avatar-jessica.jpeg" alt="" />
          <h1 class="profile_name">Umar Tanha</h1>
          <h2 class="bio">Islamabad, Pakistan</h2>
          <p class="description">"Frontend Developer and Avid Readers."</p>
        </div>

        <!-- Lower Content -->
        <div class="lowers">
          <button class="btn">GitHub</button>
          <button class="btn">LinkedIn</button>
          <button class="btn">Instagram</button>
          <button class="btn">Twitter</button>
          <button class="btn">Frontend Mentor</button>
        </div>
      </div>
    </section>

    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a href="#">Your Name Here</a>.
    </footer>
  </body>
</html>
